model = "gpt-5-codex"
model_reasoning_effort = "medium"

model_instructions_file = ".codex/instructions.md"

project_root_markers = [
    ".git",
    "gradlew",
    "mvnw",
    "pom.xml",
    "build.gradle"
]

project_doc_fallback_filenames = [
    "README.md",
    "AGENTS.md"
]

project_doc_max_bytes = 65536

[features]
memories = true
multi_agent = true